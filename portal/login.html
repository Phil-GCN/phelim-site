<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Sign In — Phelim Ekwebe Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
    .login-box{background:var(--surface);border:1px solid var(--border);padding:44px 40px;width:100%;max-width:400px;}
    .login-logo{font-family:var(--serif);font-size:1.2rem;color:var(--text);margin-bottom:6px;}
    .login-sub{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:32px;}
    .login-label{display:block;font-size:.66rem;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;margin-top:14px;}
    .login-input{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);font-family:var(--sans);font-size:.9rem;color:var(--text);outline:none;border-radius:2px;box-sizing:border-box;}
    .login-input:focus{border-color:var(--forest);}
    .login-btn{width:100%;padding:11px;background:var(--forest);color:var(--paper);font-family:var(--sans);font-size:.8rem;letter-spacing:.07em;font-weight:500;border:none;cursor:pointer;margin-top:20px;border-radius:2px;}
    .login-btn:hover{opacity:.88;}
    .login-btn-ghost{width:100%;padding:10px;background:transparent;color:var(--text-muted);font-family:var(--sans);font-size:.78rem;letter-spacing:.04em;border:1px solid var(--border);cursor:pointer;margin-top:10px;border-radius:2px;}
    .login-btn-ghost:hover{border-color:var(--text-muted);}
    .login-msg{display:none;font-size:.78rem;margin-top:12px;padding:9px 12px;border-radius:2px;}
    .login-msg.error{color:#c0392b;background:#fdf0ef;border:1px solid #f5c6c6;}
    .login-msg.success{color:#1a6b3a;background:#edf7f1;border:1px solid #b2dfc5;}
    .login-divider{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);border-top:1px solid var(--border);padding-top:24px;margin-top:28px;}
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">Phelim Ekwebe</div>
  <div class="login-sub">Content Portal</div>

  <!-- SIGN IN -->
  <div id="view-login">
    <form onsubmit="doLogin(event)">
      <label class="login-label">Password</label>
      <input class="login-input" type="password" id="pw" placeholder="Enter portal password" autofocus>
      <button class="login-btn" type="submit">Sign In</button>
      <div class="login-msg error" id="login-err">Incorrect password. Please try again.</div>
    </form>
    <button class="login-btn-ghost" onclick="showView('view-change')">Change password</button>
  </div>

  <!-- CHANGE PASSWORD -->
  <div id="view-change" style="display:none">
    <form onsubmit="doChangePassword(event)">
      <label class="login-label">Current password</label>
      <input class="login-input" type="password" id="cp-current" placeholder="Current password">
      <label class="login-label">New password</label>
      <input class="login-input" type="password" id="cp-new" placeholder="New password (min 8 characters)">
      <label class="login-label">Confirm new password</label>
      <input class="login-input" type="password" id="cp-confirm" placeholder="Repeat new password">
      <button class="login-btn" type="submit">Update Password</button>
      <div class="login-msg error" id="cp-err"></div>
      <div class="login-msg success" id="cp-ok">Password updated. You can now sign in.</div>
    </form>
    <button class="login-btn-ghost" onclick="showView('view-login')">Back to sign in</button>
  </div>
</div>
<script>
  // If already authenticated with a valid token, go straight to dashboard
  (function() {
    const token = sessionStorage.getItem('portal-token');
    if (token && isTokenValid(token)) window.location.href = '/portal/index.html';
  })();

  function isTokenValid(token) {
    try {
      const payload = token.split('.')[0];
      // base64url → base64 → JSON
      const b64 = payload.replace(/-/g, '+').replace(/_/g, '/');
      const json = JSON.parse(atob(b64));
      return json.exp && (Date.now() / 1000) < json.exp;
    } catch { return false; }
  }

  function showView(id) {
    document.getElementById('view-login').style.display = id === 'view-login' ? '' : 'none';
    document.getElementById('view-change').style.display = id === 'view-change' ? '' : 'none';
    ['login-err','cp-err','cp-ok'].forEach(function(i){ document.getElementById(i).style.display='none'; });
  }

  async function doLogin(e) {
    e.preventDefault();
    const pw  = document.getElementById('pw').value;
    const err = document.getElementById('login-err');
    const btn = e.target.querySelector('button[type="submit"]');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/api/portal-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (res.ok && data.token) {
        sessionStorage.setItem('portal-token', data.token);
        window.location.href = '/portal/index.html';
      } else {
        err.textContent = data.error || 'Incorrect password. Please try again.';
        err.style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    } catch {
      err.textContent = 'Could not reach server. Check your connection.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  // Password change is handled server-side — redirect to Netlify Identity
  // or keep as a local note since PORTAL_PASSWORD must be changed in Netlify env vars.
  function doChangePassword(e) {
    e.preventDefault();
    const err = document.getElementById('cp-err');
    const ok  = document.getElementById('cp-ok');
    err.style.display = 'none';
    ok.style.display  = 'none';
    ok.textContent = 'To change your portal password, update the PORTAL_PASSWORD environment variable in your Netlify dashboard → Site Settings → Environment Variables, then redeploy.';
    ok.style.display = 'block';
  }
</script>
</body>
</html>
